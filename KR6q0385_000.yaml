front:
  text: 敘聖箭堂述古者豫坐聖箭堂述從上佛祖之語也佛祖之語山高海積茲所述者唯若而篇何也蓋特就目力所及見者述之云爾然目力所見止於是而已乎凡事迹尋常而未經指點者或理致精深而有性地者或針砭末法之弊而深中肯綮者或履踐嚴明而臨終特異者始述之而系之以評非此則弗暇述也又時有古今人有先後茲所述者錯綜歷亂何也蓋即以所得者為先後而不以古今為銓次也是編也雖僅二萬餘言而佛祖為人之苦心亦于此可槩見每一展卷令人慧目肅清智證潔白是病是藥是正是邪一一暸然如指諸掌然後知佛祖之言示人的而陶鑄深也二三同志見而好之各輸資請梓以傳其亦得豫之心也耶因略敘數語辨之卷端使後之覽者躍然興起而廣有所述則又不特茲編而已也時歲在己亥仲春布衲道霈敘
