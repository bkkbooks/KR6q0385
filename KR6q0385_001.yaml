body:
  text: 鼓山釋道霈述天童宏智覺禪師僧堂記夫靈山之笑溫少林之坐寒東西繩繩三十三傳老盧受衣鉢而逃厥事顯著開闔翕張波瀾光𦦨肆口而說肆心而應道傳器受源深流長南嶽青原代以得人或默有所宗幽潛遠遁掃迹世外研究死生松食荷衣巢栖草座晦而不曜持養老成有慕其風師而親之鋤植舂炊采汲烹瀹溪毛原藪枯槁自甘來遠集繁乃建僧堂而統受焉齊之萃師友同事刳情刲智擯學黜師妙盡心空宗通眼活發越于設施果其能而備也建炎之末人病亂離湘漢江淮兵火燔掠尊宿叢林沒蕪八九毳衣瓶錫投栖于東南四明禪席素號小廬山郡東六十里天童道場山紆盤而氣幽松偃蹇而皮皺蒼壁附蘿烟晞而翠膩孤虹枕磵埃濯而清揚余住山之四年十方來學雲趨水赴屋不能容比丘行深遽來白事曰栢庭有子露坐簷宿殆無尋尺與受單鉢欲募淨信增大其堂得乎余頷之已而匠投于林斧鳴于谷一年餘礎布楹列梁橫桷攢棼撩翼張甍瓦鱗覆前後十四間二十架三過廊兩天井下無墻堵縱二百尺廣十六丈窓牖牀榻深明嚴潔萬指食息超遙容與謀始于紹興壬子之冬工畢于甲寅之春總費湣錢萬五千有奇冬溫夏涼晝香夜燈開鉢而飯洗足而坐耕牧其間警導以寂秋涵古井春入化機淵兮默成粲兮用光水盈科而流谷隨呼而響理契平等智應自然動靜威儀針砭相益撿責滲漏磨瑩瘢痕淬礪光芒錯礱圭角高標遠到追武古人丐心施力等不負其意氣劣學弊希易欲速以機械為蹊放蕩為徑耕于空言餒無所獲戰于強辯勝無所歸見聞流習知解汩心佛祖之所訶魔外之得便其疵癘萌孽治不可縱也登崑崙之丘決江河之水濯肝膽之汙盪心目之翳生滅跡亡而妙存有無轍泯而過量大夜之夢破永劫之疑拔出家之志償行脚之事辦相從儔侶殆庶幾焉評曰天童道高養粹學愽識贍於此記槩見之其言曰刳情刲智擯學黜師妙盡心空宗通眼活又曰耕牧其間警導以寂秋涵古井春入化機淵兮默成粲兮用光又曰動靜威儀針砭相益檢責滲漏磨瑩瘢痕淬礪光芒錯礱圭角高標遠到追武古人嗚呼學者居僧堂中誠能規此以進道尚何患大事之不辨哉其或諱其所病犯其所藥吾知自暴自棄而已故斯文錄似有志者大般若經云爾時如來四眾圍繞讚說般若付囑慶喜令受持已於大眾前現神通力令眾皆見不動梵語阿閦佛國見彼如來聲聞菩薩前後圍繞為諸海眾宣說妙法及見彼土嚴淨之相佛攝神力忽然之間令此眾會更不復見爾時佛告慶喜不動如來國土眾會汝更見否慶喜對曰我不復見彼事非此眼所行故佛告慶喜當知諸法亦復如是非眼根等所行境界法不行法法不見法法不知法法不證法慶喜當知一切法性無能見者無能行者無能知者無能證者無動無作所以者何以一切法皆如虗空無有作用能取所取性遠離故涅槃經云汝等當知先所修習無常苦想非是真實譬如春時有諸人等在大浴池乘船遊戲失琉璃寶沒深水中是時諸人悉共入水求覔是寶競捉瓦石草木沙礫各各自謂得琉璃珠歡喜持出乃知非真是時真寶猶在水中評曰昔達祖命門人各言所見尼總持云如我所見如慶喜見阿閦佛國一見更不再見祖云汝得吾肉志徹禪師呈六祖偈曰因守無常心佛演有常性不知方便者猶春池拾礫甞舉二事問同學出何典故往往不能對甚至有以臆斷者後讀般若涅槃二經乃見之始知古人發言不苟而後世學者聞見既寡又多孟浪也因併載之性空菴主漢州人久依死心獲證乃抵秀水追船子遺風結茅青龍之野吹鐵笛以自娛多賦詠得之者必珍藏其山居曰心法雙忘猶隔妄色空不二尚餘塵百鳥不來春又過不知誰是住菴人又警眾曰學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動干戈治太平又曰不耕而食不蠶衣物外清閒適聖時未透祖師關棙子也須存意著便宜又曰十二時中莫住工窮來窮去到無窮直須洞徹無窮底踏倒須彌第一峰建炎物徐明叛道經烏鎮肆殺戮民多逃亡師獨荷䇿而往賊見其偉異疑必詭伏者問其來師曰吾禪者欲抵密印寺賊怒欲斬之師曰要頭便斫去奚以怒為吾死必矣願得一飯以為送終賊奉肉食師如常齋出生畢乃曰孰為我文以祭賊笑而不答師索筆大書曰嗚呼惟靈勞我以生則大塊之過役我以壽則陰陽之失乏我以貧則五行不正困我以命則時日不吉吁哉至哉賴有出塵之道悟我之性與其妙心則其妙心孰與為隣上同諸佛之真化下合凡夫之無明纖塵不動本自圓成妙矣哉妙矣哉日月未足以為明乾坤未足以為大磊磊落落無罣無礙六十餘年和光混俗四十二臘逍遙自在逢人則喜見佛不拜笑矣乎笑矣乎可惜少年郎風流太光彩坦然歸去付春風體似虗空終不壞尚饗遂舉箸飫餐賊徒大笑食罷復曰劫數既遭離亂我是快活烈漢如今正好乘時便請一刀兩段乃大呼斬斬賊方駭異稽首謝過令衛而出烏鎮之盧舍免焚實師之惠也道俗聞之愈敬紹興庚申冬造大益穴而塞之修書寄雪竇持禪師曰吾將水塟矣壬戌歲持至見其尚存作偈嘲之曰咄哉老性空剛要餧魚鱉去不索性去祇管向人說師閱偈笑曰待兄來證明耳令徧告四眾眾集師為說法要仍說偈曰坐脫立亡不若水塟一省柴燒二省開壙撒手便行不妨快暢誰是知音船子和尚高風難繼百千年一曲漁歌少人唱遂盤坐盆中順潮而下眾皆隨至海濵望欲斷目師取塞戽水而回眾擁觀水無所入復乘流而往唱曰船子當年返故鄉沒蹤跡處妙難量真風徧寄知音者鐵笛橫吹作散塲其笛聲嗚咽頃於蒼茫間見以笛擲空而沒眾號慕圖像事之後三日於沙上趺坐如生道俗爭往迎歸留五日闍維設利大如菽者莫計二鶴徘徊空中火盡始去眾奉設利靈骨建塔于青龍評曰嗟乎死生亦大矣而空向劒刃之上急潮之中縱橫賣弄超然自得苟非見道根柢履踐明白曷克臻此乎世之參汞銀禪觸火便流喪厥所守者視此殆可以少警云洪覺範禪師畫浪軒記建中靖國改元夏余客洞山禪悅堂之東齋中無長物唯置一牀覆以遽篨架書數卷於枕間傃南開軒以納眾山之勝眼倦拋書坐臥惟山之接山容無盡而樂亦無厭也三伏大熱坐榻皆溫林陰拂掠不足以剪畏日有蜀道人得孫知微活水遺法為余壁間作崩掀渺漫之圖以來凉氣解衣䃲礴奮筆而成余驚定歎曰異哉一堵之間須臾之頃而足江湖南頃之勢壯波怒渦窪窿千狀而有不窮之變陰風徐來毛骨震掉忽焉如舟洞庭而望霜曉也能復有險畏神速於此者乎道人舉杖指以謂余曰龍驤萬斛逶迤而進如欲濟如慎畏有如明公卿任大責重思所以濟民而報國者也舳艫銜尾追逐上下如行如留有如仕路之紛紛方進而未艾者也魚龍變化更相出沒有如賤而忽顯貴而忽棄者也一葉之艇傲顛風而舞澎湃超然自得有如道德奇逸雜市人而無辨者也世波之神速險畏其有以類此故吾圖之至於白鷗沙禽汎汎隨流若無所與者又如我輩宅青山而侶白雲然猶思高飛遠引不能與之俱涉也余捫其洶湧起突之處點畫穠纖之間語之曰果有生滅變易否乎曰無有也夫天地萬物之盛衰古今寒暑之往來是非榮辱相尋於無窮而死生憂患追逐之而不赦錯綜歷乱如蜜房如乱絲者如比畵浪初未始有生滅有變易而其顛倒妄自驚恠者如子自畵之而又自畏之也古之大聖人皆能游戲於此故曰是法住法位世間相常住又曰一切法常靜無有起滅相震旦駒兒子之鄉老也而亦曰如畵水成文不生不滅何遽忘之也耶於是道人顧余而笑曰願從子游因名其軒曰畵浪又為之記評曰往歲讀東坡赤壁賦既愛其文之敏妙又愛其理之精深以謂世無有過之者後讀覺範此記以畵浪說法傾盡佛祖底蘊且其文縱橫浩蕩若此不知其𮌎中已吞吐幾赤壁也此豈文人才士之所能為哉師甞自言余幼孤知讀書為樂而不得其要落筆甞如人掣其肘又如瘖者之欲語而意窒舌大而濃笑者數數然年十六七從洞山雲庵學出世法忽自信而不疑誦生書七千下筆千言跬步可待也嗚呼學道之益人未論其死生之際益其文字語言如此益可自信也今以此記觀之良然宏智覺住天童大惠杲住育王相去二十里許法喜酬酢往來不間宏智一日過衛寺丞進可之家有堂曰六湛盖取楞嚴六處休復同一湛然之義請偈發明其旨智題曰風瀾未作見靈源六處亡歸體湛存諸法性空方得坐一彈指頃頓開門寒梅籬落春能早野雪櫺窓夜不昏萬象森羅心印印諸塵超豁妙無痕既而大惠又繼至且請和之惠即和曰非湛非搖此法源當機莫厭假名存直須過量英靈漢方入無邊廣大門萬境交羅元不二六窓晝夜未甞昏飜思龐老事無別擲劒揮空豈有痕評曰或疑二師道合而言似有頓漸何也良以按題發揮宏智檀美于前盡力馳騁大惠奪標于後又宏智為寺丞說法故不免步步區區而大惠直說自己心中所行法門乃爾浩浩蕩蕩也嵩嶽元珪禪師居岳之龐塢一日有異人峩冠袴褶而至從者極多輕步舒徐𫁉謁大師師覩其形貌奇偉非常乃諭之曰善來仁者胡為而至彼曰師寧識我耶師曰吾觀佛與眾生等吾一目之豈分別耶彼曰我此岳神也能生死於人師安得一目我哉師曰吾本不生汝焉能死吾視身與空等視吾與汝等汝能壞空與汝乎苟能壞空及汝吾則不生不滅也汝尚不能如是又焉能生死吾耶神稽首曰我亦聰明正直于餘神詎知師有廣大之智辯乎願授以正戒令我度世師曰汝既乞戒即既戒也所以者何戒外無戒又何戒哉神曰此理也我聞茫昧止求師戒我身為門弟子師即為張座秉爐正几曰付汝五戒若能奉持即應曰能不能即曰否曰謹受教師曰汝能不婬乎曰我亦娶也師曰非謂此也謂無羅欲也曰能師曰汝能不盜乎曰何乏我也焉有盜取哉師曰非此謂也謂饗而福淫不供而禍善也曰能師曰汝能不殺乎曰實司其柄焉曰不殺曰非謂此也謂有濫誤疑混也曰能師曰汝能不妄乎曰我正直焉有妄乎師曰非謂此也謂先後不合天心也曰能師曰汝不遭酒敗乎曰能師曰如上是為佛戒也又言以有心奉持而無心拘執以有心為物而無心想身能如是則先天地生不為精後天地死不為老終日變化而不為動畢盡寂默而不為休信此則雖娶非妻也雖饗非取也雖柄非權也雖作非故也雖醉非惽也若能無心於萬物則羅欲不為婬福淫禍善不為盜濫誤疑混不為殺先後違天不為妄惽荒顛倒不為醉是謂無心也無心則無戒無戒則無心無佛無眾生無汝及無我孰為戒哉神曰我神通亞佛師曰汝神通十句五能五不能佛則十句七能三不能神悚然避席跪啟曰可得聞乎師曰汝能戾上帝東天行而西七曜乎曰不能師曰汝能奪地祇融五嶽而結四海乎曰不能師曰是謂五不能也佛能空一切相成萬法智而不能即滅定業佛能知羣有性窮億劫事而不能化導無緣佛能度無量有情而不能盡眾生界是為三不能也定業亦不牢久無緣亦是一期眾生界本無增減亘古今無一人能主其法有法無主是謂無法無法無主是謂無心如我解佛亦無神通也但能以無心通達一切法爾神曰我誠淺昧未聞空義師所授戒我當奉行今願報慈德効我所能師曰吾觀身無物觀法無常塊然更有何欲耶神曰我必命我為世間事展我小神功使已發心初發心未發心不信心必信心五等人目我神蹤知有佛有神有能有不能有自然有非自然者師曰無為是無為是神曰佛亦使神護法師寧隳叛佛耶願隨意垂誨師不得已而言曰東巖寺之障莾然無樹北岫有之而背非屏擁汝能移北樹於東嶺乎神曰已聞命矣然昏夜必有喧動願師無駭即作禮辭去師門送而且觀之見儀衛逶迤如王者之狀嵐靄烟霞紛綸間錯幢幡環珮凌空隱沒焉其夕果有暴風吼雷奔雲掣電棟宇搖蕩宿鳥聲喧師謂眾曰無怖無怖神與我契矣詰旦和霽則北巖松栝盡移東嶺森然行植師謂其徒曰吾沒後無令外知若為口實人將妖我也評曰珪縱廣大無礙之辯為嶽神演無上道俾神敬服移樹献誠珪豈常人哉其言曰以有心奉持而無心拘執以有心為物而無心想身又曰亘古今無一人能主其法有法無主是謂無法無法無主是謂無心如我解佛亦無神通但能以無心通達一切法爾珪能發揮至此可謂至矣盡矣愚謂其與嵩嶽竝峙可也雲門匡真禪師臨終辭廣主遺表伏聞有限色身詎免榮枯之歎無形實相孰云遷變之期既風燈炬焰難留在水月空華何適罔避典之咎將陳委蛻之詞臣中謝伏念臣跡本寒微生從草莾爰自髫齓切慕空門潔誠誓屏於他緣銳志唯探於內典其或忘餐侍問立雪求知困風霜於十七年間涉南北於數千里外始見心猿罷跳意馬休馳身隈韶石之雲頭變楚山之雪以至榮達景運屢沐天波詰道談空誓答乾坤之德開蒙發滯星馳雲水之徒獲揚利益之因逈自聖明之澤加以聯叨鳳詔累對龍庭繼奉頒宣重疊慶賜撫躬惆悵殞命何酬不謂臣駑馬年衰難勝睿渥遽縈淪於疲瘵唯待盡於朝昏星漢程遙遐而纔瞻北極波濤去速迴眸而已逐東流伏願鳳曆長春扇皇風於拂石之劫龍圖永固齊壽考於芥子之城臣限餘景無時微躬將謝不獲奔辭丹闕祝別彤庭臣無任瞻天戀聖激切屏營之至謹奉表以聞評曰雲門平生氣宇如王說法如雲如雨而垂死辭世之言乃特敘其參訪履歷之功曰忘餐侍問立雪求知困風霜於十七年間涉南北於數千里外始見心猿罷跳意馬休馳嗚呼今日學者未具一知半解而輒自謂千了萬當墮增上慢者亦可以思矣梁寶誌和尚十二時頌曰平旦寅狂機內有道人身窮苦已經無量劫不信常擎如意珍若捉物入迷津但有纖毫即是塵不住舊時無相貌外求知識也非真日出卯用處不須生善巧縱使神光照有無起意便遭魔事撓若施功終不了日夜被他人我抝不用安排只麼從何曾心地生煩惱食時展無明本是釋迦身坐臥不知元是道只麼忙忙受苦辛認聲色覔疎親只是他家染污人若擬將心求佛道問取虗空始出塵禺中巳未了之人教不至假使通達祖師言莫向心頭安了義只守玄沒文字認著依前還不是暫時自肯不追尋曠劫不遭魔境使日南午四大身中無價寶陽𦦨空花不肯拋作意修行轉辛苦不曾迷莫求悟任你朝陽幾迴暮有相身中無相身無明路上無生路日昳未心地何曾安了義他義文字沒親疎不用將心求的意任縱橫絕忌諱長在人間不居世運用不離聲色中歷劫何曾暫拋棄晡時申學道先須不厭貧有相本來權積聚無形何用要安真作淨潔却勞神莫認愚癡作近隣言下不求無處所暫時喚作出家人日入酉虗幻聲音不長久禪悅珍饈尚不餐誰能更飲無明酒勿可拋勿可守蕩蕩道遙不曾有縱爾多聞達古今也是癡狂外邊走黃昏戌狂子施功投暗室假使心通無量時歷劫何曾異今日擬商量即啾唧轉使心頭黑如漆晝夜舒光照有無癡人喚作波羅蜜人定亥勇猛精進成懈怠不起纖毫修學心無相光中常自在超釋迦越祖代心有微塵還窒礙放蕩長如癡兀人他家自有通人愛夜半子心住無生即生死生死何曾屬有無用時便用無文字祖師言外邊事識取起時還不是作意搜求實沒蹤生死魔來任相試鷄鳴丑一顆圓光明已久內外推尋覔總無境上施為渾大有不見頭亦無干世界壞時渠不朽未了之人聽一言只這如今誰動口評曰梁武帝甞問公曰弟子煩惑未祛何以治之公曰十二又問十二之旨安在曰書字時節刻漏中又問何時得淨心修習答曰安樂禁之今觀此頌殆其注脚也學者誠能得其旨歸則二六時中自無虗棄底道理尚無安樂之可言況煩惑哉汾陽昭禪師太原人俗姓俞氏十四出家既受具即杖䇿遊方所至少留隨機扣發歷參知識七十一員最後到首山問百丈捲蓆意旨如何山曰龍袖拂開全體現曰師意何如山曰象王行處絕狐蹤昭于言下大悟拜起而曰萬古碧潭空界月再三撈漉始應知時葉縣省禪師作首座問曰昭兄見何道理便爾自肯昭曰正是我放身捨命處服勤甚久辭去遊襄沔間每為郡守以名剎力致乃曰我長行粥飯僧傳佛心宗非細事也前後八請堅臥不答洎首山歿西河道俗遣僧契聰迎請住持師閉門高枕聰排闥而入讓之曰佛法大事靖退小節風穴懼應讖憂宗旨墜滅幸而有先師先師已棄世汝有力荷擔如來大法者今何時而欲安眠哉師矍起握聰手曰非公不聞此語趣辦嚴吾行矣既至燕坐一榻足不越閫者三十年後因龍德府尹李侯與師有舊虗承天寺致之使者三反不赴使者受罰後至云必欲得師俱往不然有死而已師笑曰老僧業已不出院借往當先後之何必俱耶使者曰師諾則先後惟所擇師乃令設饌且束曰吾行矣停箸而化評曰汾陽始行脚則徧歷諸方共參七十餘員知識既得道則深自韜晦八請不起及出世則以荷擔大法為己任足不越閫者三十年其入滅則為世緣所逼乃談笑而去之嗚呼若汾陽可謂徹始徹終盡善盡美古今天下第一等榜樣也後之有志于道者可無仰止之思乎僧問香嚴如何是道嚴曰枯木裏龍吟曰如何是道中人嚴曰髑髏裏眼睛僧不領乃舉問石霜如何是枯木裏龍吟霜曰猶帶喜在曰如何是髑髏裏眼睛霜曰猶帶識在又不領乃舉似曹山山曰石霜老聲聞作這箇見解因示頌曰枯木龍吟真見道髑髏無識眼初明喜識盡時消息盡當人那辨濁中清僧遂又問山如何是枯木裏龍吟山曰血脉不斷曰如何是髑髏裏眼睛山曰乾不盡曰未審還有得聞者麼山曰盡大地未有一人不聞曰未審枯木裏龍吟是何章句山曰不知是何章句聞者皆喪評曰傳燈錄收此一段機緣刪去曹山云石霜老聲聞作這箇見解一句已似失語脉而會元又以曹山前頌接於後答語之下益亂厥旨矣今據神鼎語錄所載詳之于此死心頎禪師秦之龍城人初得法於天聖秦和尚晚依黃龍南禪師南見其所得諦當甚厚遇之令住全之興國開堂遂為南之嗣至夜夢神告曰師遇惡疾即是緣盡言畢而隱閱十三白果患大風屏院事歸龍城之西為小菴菴成養病其中有小師名克慈久依楊歧亦禪林秀出者歸以侍病奉禮至孝乞食村落風雨寒暑盡師一世而後已頎一日謂慈曰吾之所得實在天聖和尚晚見黃龍道行兼重心所敬慕故為嗣之豈謂半生感此惡疾今幸償足昔神仙多因惡疾而得仙道盖其割棄塵累懷潁陽之風所以因禍而致福也吾不因此安得有今日事如今把住也由我放行也由我施行把住總得自在遂噓一聲良久而逝闍維異香徧野舍利無數評曰嗣法不原所自而得不美之報者宋世多矣未見現招惡疾若頎如此其烈者然頎既能責心自悔尅苦力踐収功於末後則所謂因禍而致福者豈虗語哉芙蓉楷禪師者乃投子青華嚴嫡嗣也大觀元年京師大法雲寺席虗有司以師有道行請于朝願令繼嗣住持奉旨可其請未幾開封大尹李孝壽表師禪學卓冠叢林宜有以褒顯之即賜紫方袍號定照禪師左璫持詔至法雲師謝恩已乃為表辭曰伏蒙聖慈特差彰善閣祗候譚禎賜臣定照禪師號及紫衣牒一道臣戴睿恩已即時焚香升座仰祝聖壽伏念臣行業迂疎道力綿薄甞發誓願不受名利堅持此志積有歲年庶幾於此傳道後來使人專意佛法今雖蒙異恩若遂忝冐則自違素願何以教人豈能仰稱陛下所以命臣住持之意所有前件恩牒不敢祗受伏望聖慈察臣愚悃非敢飾辭特賜允俞臣沒齒行道上報天恩上閱之以付李孝壽躬往諭朝廷旌善之意而師執抝不回開封府尹具以其事聞上大怒收師送大理寺吏知師忠誠而適批逆鱗有憐之之意問曰長老枯悴有病乎師曰無之吏曰有疾則免刑配師曰平時有疾今實無豈敢藉疾僥倖聖朝欲脫罪譴耶吏歎息久之竟就刑縫掖其衣編管淄州都城道俗觀者如市皆為之流涕而師神和氣平安步而去如平日至淄州僦屋以居而四方衲子爭奔隨之接武于道明年冬勑令自便菴於芙蓉湖心學者愈親示眾曰夫出家者為厭塵勞求脫生死休心息念斷絕攀緣故名出家豈可以等閑利養埋沒平生直須兩頭撒開中間放下遇聲遇色如石上栽花見利見名似眼中著屑況從無始以來不是不曾經歷又不是不知次第不過飜頭作尾止於如此何須苦苦貪戀如今不歇更待何時所以先聖教人祇要盡却今時能盡今時更有何事若得心中無事佛祖猶是冤家一切世間自然冷淡方始那邊相應你不見隱山至死不肯見人趙州至死不肯告人匾擔拾橡標為食大梅以荷葉為衣紙衣道者祇披紙玄泰上座祇著布石霜置枯木堂與人坐臥祇要死了你心投子使人辦米同煑共餐要得省取你事且從上諸聖有如此榜樣若無長處如何甘得諸仁者若也於斯體究的不虧人若也不肯承當向後深恐費力山僧行業無取忝主山門豈可坐費常住頓忘先聖付囑今者輙斆古人為住持體例與諸人議定更不下山不赴齋不發化主唯將本院莊課一歲所得均作三百六十分日取一分用之更不隨人添減可以備飯則作飯作飯不足則作粥作粥不足則作米湯新到相見茶湯而已更不煎點唯置一茶堂自去取用務要省緣專一辦道又況活計具足風景不疎華解笑鳥解啼木馬長鳴石牛善走天外之青山寡色耳畔之鳴泉無聲嶺上猿啼露濕中宵之月林間鶴唳風回清曉之松春風起而枯木龍吟秋葉凋而寒林花散玉堦鋪苔蘚之紋人面帶烟霞之色音塵寂爾消息宛然一味蕭條無可趣向山僧今日向諸人面前說家門已是不著便豈可更去陞堂入室拈槌竪拂東喝西棒張眉努目如癎病發相似不唯屈沈上座況亦辜負先聖你不見達磨西來少室山下面壁九年二祖至於立雪斷臂可謂受盡艱辛然而達磨不曾措了一詞二祖不曾問著一句還喚達磨作不為人得麼二祖做不求師得麼山僧每至說著古聖做處便覺無地容身慚愧後人軟弱又況百味珍饈𮞏相供養道我四事具足方可發心祇恐做手脚不迭便是隔生隔世去也時光似箭深為可惜雖然如是更在他人從長相度山僧也強教你不得諸仁者還見古人偈麼山田脫粟飯野菜淡黃喫則從君喫不喫任東西伏惟同道各自努力珍重評曰曹洞一宗至大陽不得浮山暗穿玉線或幾乎息矣及授皮履直裰於投子天下猶疑信相半再得芙蓉繼之而其道始大振且凜凜標格如雪鴻戾天可仰而不可即今以其所言較其所行若函盖然嗚呼此其所以起曹洞也大寶積經佛告電得菩薩言初業菩薩未入正位於諸眾生勝志樂行不能善知若在家若出家皆不應起嫌害之心勿於長夜自致衰惱是故菩薩從初發心當於一切住大乘者生於佛想於餘眾生雖復見彼作諸惡業而亦不起損害之心何以故如來常說於諸眾生於白淨法有少缺減終不能得入於涅槃菩薩若見貪行眾生應作是念彼為貪欲熱惱所燒是我過咎見彼瞋恚及以愚癡熱惱燒者皆悉念言是我之罪何以故我見一切眾生病苦應為求藥方便療治我先誓願除眾生病而今捨置是我過咎菩薩成就如是意樂自省其過於諸眾生深起慈心若遇殺害割截身分於彼怨所生反報心無有是處電得菩薩如是正修行時過去所有不善之業永盡無餘未來不善終不更起電得乃往古昔阿僧祇劫然燈佛前有佛名勝生如來出現於世世界名光明在安隱王城林中而住爾時有旃陀羅名為可畏兇險好殺安忍無慈手塗于血見者皆懼時旃陀羅繫牛其舍方入欲殺牛見驚怖掣繩奔走往於勝生如來林所時旃陀羅持刀隨逐彼牛惶怖墜於深坑其命將終楚痛哮吼時旃陀羅見是牛已更增忿怒便入坑中持刀欲殺未下之頃爾時勝生如來於彼林中無量百千大眾圍遶廣為分別緣起法門所謂無明緣行行緣識乃至生緣老死憂悲苦惱如是因緣一切皆是純大苦集於此緣中無明於行無思無覺行於無明亦無思無覺乃至生於老死無思無覺老死於生亦無思無覺如是諸法性不可得無行無念無我我所本性清淨各不相知凡夫不聞如是法故執色是我我有諸色色屬於我乃至受想行識亦復如是由此執著我我所故無常計常苦計於樂不淨計淨無我計我生四顛倒顛倒見故無明迷惑不正思惟隨心染著不能破壞有愛繫縛生死輪迴相續不斷智者善觀法界相故不見有少我人眾生乃至壽命生老病死繫縛殺害而可得者電得爾時可畏旃陀羅於是時中遙聞如來說法之聲即便覺悟尋止殺心棄所持刀從坑而出往詣佛所頂禮雙足却住一面白言世尊我今願欲於佛法中出家為道佛言可爾善來比丘即成沙門得具足戒爾時勝生如來知彼意樂漸已成熟廣為演說諸菩薩行可畏聞已證無生忍於佛法中永不退轉彼牛得聞如來所說緣起法句其聲微妙心生喜悅命終之後生兜率天得見彌勒成就正信如是電得諸眾生行甚深微密難識難知是故電得菩薩欲求菩提應為善知眾生根行於一切眾生中住平等心無礙之心於一切法常無染著捨諸所有修持淨戒安住忍辱發起精進入諸禪定如實觀察一切法性評曰世尊慮初業菩薩不達眾生根性差別於不善者起嫌害心故引過去可畏旃陀羅殺牛得忍因緣以見眾生根行微密難可測識不可恣心生滅輒興嫌害自貽伊戚當等心視之可也達磨謂二祖曰勿輕未悟一念迴機便同本得亦以是哉靈源清禪師每謂人曰今之學者未脫生死病在甚麼處病在偷心未死耳然非其罪為師者之罪也如漢高帝紿韓信而殺之信雖死其心果死乎古之學者言下脫生死效在甚麼處在偷心已死然非學者自能爾實為師者鉗鎚妙密也如梁武帝御大殿見侯景不動聲色而景之心已枯竭無餘矣諸方所說非不美麗要之如趙昌畵花雖逼真非真花也清臨終前十日自作無生常住真歸告曰賢劫第四尊釋迦文佛直下第四十八世孫惟清雖從本覺應緣出生而了緣即空初無自性氏族親里莫得而詳但以正因一念為所宗承是廁釋迦之遠孫其號靈源叟據自了因所了妙性無名字中示稱謂耳所以六祖問讓和尚什麼處來曰嵩山來祖曰什麼物恁麼來曰說似一物即不中祖曰還假修證否曰修證則不無染污即不得祖曰即此不染污是諸佛之所護念汝既如是吾亦如是茲葢獨標清淨法身以遵教外別傳之宗而揀去報化非真佛亦非說法者然非無報化大功大用謂若解通報化而不頓見法身則滯汙染緣乖護念旨理必警省耳顧朝露身緣勢迫晞墜因力病釋俗從真敘如上事以授二三子吾委息後當依稟觀究即不違先聖法門而自見深益慎勿隨末法所尚乞空文於有位求為銘誌張飾說以凂吾至囑至囑因自所敘曰無生常住真歸告且繫之以銘銘曰無涯湛海瞥起一漚亘乎百年曷浮曷休廣莫清漢歘生片雲有無起滅隱顯何分了茲二者即見實相十世古今始終現量吾銘此旨昭示汝曹泥多佛大水長船高評曰世尊取滅雙林曰我今安住常寂滅光而靈源叟遷化作無生常住真歸告獨標清淨法身揀去報化亦即佛所謂安住常寂滅光也其偷心已死之明焉後分大涅槃經云爾時世尊如是逆順入諸禪已普告大眾我以甚深般若徧觀三界一切六道諸山大海大地含生如是三界根本性離畢竟寂滅同虗空相無名無識永斷諸有本來平等無高下想無見無聞無覺無知不可繫縛不可解脫無眾生無壽命不生不起不盡不滅非世間非非世間涅槃生死皆不可得二際平等等諸法故閒居靜住無所施為究竟安置必不可得從無住法法性施為斷一切相一無所有法相如是其知是者名出世人是事不知名生死始爾時世尊說是語已復入超禪入超禪已復告大眾我以摩訶般若徧觀三界有情無情一切人法悉皆究竟無繫縛者無解脫者無主無依不可攝持不出三界不入諸有本來清淨無垢無煩惱與虗空等不平等非不平等盡諸動念思想心息如是法相名大涅槃真見此法名為解脫凡夫不知名曰無明作是語已復入超禪入超禪已復告大眾我以佛眼徧觀三界一切諸法無明本際性本解脫於十方求了不能得根本無故所因枝葉皆悉解脫無明解脫故乃至老死皆得解脫以是因緣我今安住常寂滅光名大涅槃爾時世尊三反入諸禪定三反示誨眾已於七寶牀右脇而臥於其中夜寂然無聲於是時頃便般涅槃評曰如來當入涅槃苦口叮嚀再三披剝始以甚深般若次以摩訶般若後以佛眼徧觀三界根本性離畢竟寂滅同於虗空乃至云以是因緣我今安住常寂滅光名大涅槃嗚呼至矣盡矣毫髮無遺憾矣學道者誠能於此旨深究而力行之可謂法王真子真報佛恩者矣黃龍清禪師寄得法弟子守卓書曰前舉少林言明多行少說多通少者盖謂其非不行非不通但作是念我已明道他未明道我善說理他不善說理我見尚存違於宗旨故顯其不行不通非徒不行不通亦驗其於道未甚徹底明於理未善真實說故祖師推出此病要後人省覺以成就契於本道本理免有彼我勝負之習久久返落魔外也又云悟佛心宗解行相應名之曰祖全真之解稱實之行若會於心宗豈復有異端乎祖師只使人到此全解全行無解無行之本家得大安樂耳所以傳燈後卷有達磨四行一段其示人之意亦不出此後輩少肯深究力行豈不辜他先聖哉忠國師云禪宗學者須遵佛語一乘了義契自心源不了義者互不相許如師子身中虫夫為人師若涉名利別開異端則自他何益如世大匠斤斧不傷其手香象所負非驢所堪斯言亦今時之針艾矣予病中靜坐瞌睡之餘或究古德至言或觀目前世態聞見千差一歸虗照識道人之過患以成內省自鞭之益者尤多恨阻遠不得曾言因筆略引以當面話千萬體悉勉旃評曰卓公靈源門下傑出者靈源付書無慮十餘則而是幅尤喫緊叮嚀會元載卓泉州人俗姓莊氏出世東京長靈於宣和五年十二月二十七日奄然示寂闍維日皇帝遣中使賜香持金盤求設利爇香罷盤中鏗然視之五色者數顆大如豆使者持還上見大悅予謂死生之際決不容偽卓之靈應若此則知平生真能一遵師訓者靈源可謂有子矣明教嵩禪師題遠公影堂文曰遠公事跡學者雖見而鮮能盡之使世不昭昭見先賢之德亦後學之過也予讀高僧傳蓮社記及九江新舊錄最愛遠公凡六事謂可以勸也乃引而釋之列之影堂以示來者陸修靜異教學者而送過虎溪是不以人而棄言也陶淵明酖湎於酒而與之交葢簡小節而取其達也䟦陀高僧以顯異被擯而延且譽之葢重有識而矯嫉賢也謝靈運以心雜不取而果歿於刑葢識其器而慎其終也盧循欲叛而執手求舊葢自信道也桓玄振威而抗對不屈葢有大節也大凡古今人情莫不畏威而苟免忘義而避疑好名而昧實黨勢而忍孤節行而畏累自是而非人孰有道尊一代為賢者師肯以片言而從其人乎孰有夙稟勝德為行耿潔肯交醉卿而高其達乎孰有屈人師之尊禮斥逐之客而伸其賢乎孰有拒盛名之士不與于教而克全終乎孰有義不避禍孰睦故舊而信道乎孰有臨將帥之威在殺伐暴虐之際守道不撓而全節乎此故遠公識量遠大獨出於古今矣若其扶荷至教廣大聖道垂祐于天人者非蒙乃能盡之其聖歟賢邪偉乎大塊噫氣六合清風遠公之名聞也四海秋色神山中聳遠公之清高也人僧龍鳳高揖巢許遠公之風軌也白雲丹嶂玉樹瑤草遠公之栖處也蒙後公而生雖慕且恨焉瞻其遺像稽首作禮願以弊文題于屋壁評曰遠公六事非嵩禪師莫能拈出且其文光如日月勢若連環足以追配遠公奠乾坤而不朽矣夫僧海中有此人物有此文章學者往往置之不問何哉蔣山贊元禪師舒王甞問祖師意旨元不答王益扣之元曰公般若有障三有近道之貭一更一兩生來恐純熟王曰願聞其說元曰公受氣剛大世緣深以剛大氣遭世深緣必以身任天下之重懷經世之志用捨不能必則心未平以未平之心持經世之志何時能一念萬年哉又多怒而學問尚理於道為所知愚此其三也特視名利如脫髮甘淡薄如頭陀此為近道且當以教乘滋茂之可也王再拜受教評曰荊公生平出處不出元之所料而所示法門對病施藥深中膏肓荊公烏得不心折哉元真大善知識也羅湖野錄載臨安南蕩崇覺空禪師生緣姑熟參侍黃龍死心禪師死心惜其福不逮慧以無應世為囑草堂清公送以偈曰十年聚首龍峰寺一悟真空萬境閒此去隨緣且高隱莫將名字落人間尋棲止天台望高叢林應命崇覺未幾院罹回祿黽勉於土木之役亦無倦誨接甞頌野狐語曰含血潠人先污其口百丈野狐失頭狂走驀地喚回打箇筋斗空之天資精悍知見甚高律身精嚴外請不赴有欲迎齊為架三門乃告以捨家財荷公發心矣背眾食奈我破戒何其固守如此然平居氣凌諸方於學徒亦鮮假詞色真有父風卓然可敬也評曰空父死心則草堂其叔父行也二老皆以無出世為囑而空竟出世崇覺未幾院罹回祿而區區於土木之間得非犯其所誡而致然耶空雖道眼明白而所守則不及性空石頭輩遠矣圭峰宗密禪師山南溫慥尚書問悟理息妄之人不結業一期命終之後靈性何依師曰一切眾生無不具有覺性靈明空寂與佛無殊但以無始劫來未曾了悟妄執身為我相故生愛惡等情隨情造業隨業受報生老病死長劫輪迴然身中覺性未曾生死如夢被驅役而身本安閒如水作氷而濕性不易若能悟此性即是法身本自無生何有依托靈靈不昧了了常知無所從來亦無所去然多生妄執習以性成喜怒哀樂微細流注真理雖然頓達此情難以卒除須長覺察損之又損如風頓止波浪漸停豈可一生所脩便同諸佛力用但可以空寂為自體勿認色身以靈知為自心勿認妄念妄念若起都不隨之即臨命終時自然業不能繫雖有中陰所向自由天上人間隨意寄託若愛惡之念已泯即不受分段之身自能變短為長易麤為妙若微細流注一切寂滅唯圓覺大智朗然獨存即隨機應現千百億化身度有緣眾生名之曰佛謹對釋曰馬鳴菩薩撮略百本大乘經宗旨以造大乘起信論論中立宗說一切眾生心有覺義不覺義覺中復有本覺義始覺義上所述者雖但約照理觀心處言之而法義亦同彼論謂從初至與佛無殊是本覺也從但以無始下是不覺也從若能悟此下是始覺也始覺中復有頓悟漸修從若能至亦無所去是頓悟也從然多生妄執下是漸修也漸修中從初發心乃至成佛有三位自在從初至隨意寄託者是受生自在也從若愛惡之念下是變易自在也從若微細流注下至末是究竟自在也又從但可以空寂為自體至自然業不能繫正是悟理之人朝暮行心修習止觀之要節也宗密先有八句之偈顯示此意曾於尚書處誦之奉命解釋偈曰作有義事是惺悟心作無義事是狂亂心狂亂隨情念臨終被業牽惺悟不由情臨終能轉業評曰圭峰此論葢從上佛祖由迷得悟轉凡成聖之楷式近世禪者悟理不真修行不實而日用言行早已矛盾矧臨生死耶初祖達磨曰行解相應名之曰祖又僧問石霜曰有頭無尾時如何霜曰口吐黃金堪作甚麼由此觀之圭峰頓悟漸修之說確乎不易之論也汾陽昭禪師十五家宗風歌號曰廣智其詞曰大道不說有高低真空那肯涉離微大海吞流同增減妙峰高聳總擎持萬派千溪皆渤澥七金五岳盡須彌玉毫金色傳燈後二三四七普聞知信衣息廣開機諸方老宿任施為識心是本從頭說迷心逐物却生疑翠巖芝禪師註曰此敘宗旨也或直指或巧施解道前綱出後機旨趣分明明似鏡盲無慧目不能窺明眼士見精微不言勝負墜愚癡物物會同流智水門風逐便示宗枝即心佛非心佛歷世明明無別物即此真心是我心我心猶是機權出此敘馬祖宗派也或五位或三路施設隨根巧回互不觸當今是本宗展手通玄無佛祖此敘洞上宗派也或君臣或父子量器方圓無彼此士庶公侯一道平愚智賢豪明漸次此敘石霜宗派也有時敲有時唱隨根問答談諦當應接何曾失禮儀淺解之流却生謗或雙明或單說只要當鋒利禪悅開權不為鬪聰明舒光只要辨賢哲有圓相有默論千里持來目視瞬萬般巧妙一圓空爍迦羅眼通的信此敘溈仰宗派也或全提或全用萬象森羅實不共青山不礙白雲飛隱隱當臺透金鳳此敘石頭藥山宗派也象骨鏡地藏月玄沙崇壽照無缺因公致問指歸源旨趣來人明皎潔此敘雪峰地藏宗派也或稱提或拈掇本色衲僧長擊發句裏明人事最精好手還同楔出楔或擡薦或垂手切要心空易開口不識先人出大悲管燭之徒照街走此敘雲門宗派也德山棒臨濟喝獨出乾坤解橫抹從頭誰管亂區分多口阿師不能說臨機縱臨機奪迅速機鋒如電掣乾坤只在掌中持竹木精靈腦劈裂或賓主或料揀大展禪宗辯正眼三玄三要用當機四句百非一齊鏟勸同袍莫強會少俊依前成窒礙不知宗脉莫漫汗永劫長沉生死海難逢難遇又難聞猛烈身心快通泰此敘德山臨濟宗派也評曰永嘉云六代傳衣天下聞後人得道無窮數而汾陽亦云信衣息廣開機諸方老宿任施為所以當時宗風層見疊出而世唯稱五家宗派者據盛者言之耳汾陽歷參七十餘員知識盡得諸宗家法故一一頌出使知曹溪之後生機一路日出日新必英靈出格之士始能一以貫之若夫小根劣器步步區區各師其師各宗其宗者可得同日而語哉昔張無盡呂夏卿疑德山洞山同出石頭而垂手處殺活不同者亦足以見其隘矣永明壽禪師宗鏡錄云設有堅執己解不信佛言起自障心絕他學路今有十問以定紀綱還得了了見性如晝觀色似文殊等不還逢緣對境見色聞聲舉足下足開眼合眼悉得明宗與道相應不還覽一代時教及從上祖師言句聞深不怖皆得諦了無疑不還因差別問難種種徵詰能具四辯盡決他疑不還於一切時一切處智照無滯念念圓通不見一法能為障礙未曾一剎那中暫令間斷不還於一切逆順好惡境界現前之時不為間隔盡識得破不還於百法明門心境之內一一得見微細體性根源起處不為生死根塵之所惑亂不還向四威儀中行住坐臥欽承祗對著衣喫飯執作施為之時一一辯得真實不還聞說有佛無佛有眾生無眾生或讚或毀或是或非得一心不動不還聞差別之智皆能明達性相俱通理事無滯無有一法不鑑其源乃至千聖出世得不疑不若實未得如是切不可起過頭欺誑之心生自許知足之意直須廣彼至教博問先知徹祖師自性之源到絕學無疑之地此時方可歇學灰息遊心或自辨則禪觀相應或為他則方便開示設不能徧參法界廣究羣經但細看宗鏡之中自然得入此是諸法之要趣道之門評曰起過頭欺誑之心生自許知足之意乃末法學者之大病今此十問盡祖師命脉窮諸佛壼奧驗之於事印之於心如寶鏡高懸𡟎妍自見若已透關者不在此限不然須一一歷過始得且善財既見妙德而重歷百城慶喜已獲法身而廣申問難豈徒然哉三祖云毫𨤲有差天地懸隔政為此可凡真心學道者請於此問子細審勘慶其所已得而勉其所未至則佛法幸甚圓悟禪師示一書記法語英靈衲子蘊卓識奇姿慷慨隳冠視身世聲名如遊塵浮雲谷響以夙昔大根器知有此段超生出死絕聖越凡乃三世如來所證金剛正體歷代祖師單傳妙心跂步蹴踏作香象金翅要馳驟飛騰於億千萬類之上截流摩霄豈肯為鴻鵠燕局促於高低勝負較目前電光石火間瞥轉利害耶是故古之大達不記細故不圖淺近發片志欲高超佛祖荷擔一切所不能承當之重任普津濟四生九類苦與安破障道愚昧折無明顛狂毒箭拈出法眼見刺使本地風光澄霽空劫已前面目明顯悉心竭力不憚寒暑廢寢忘餐刻意尚行潔清三業向三條椽下死却心猿殺却意馬直使如枯木朽株頑石頭相類驀地穿透豈從他得哉發大伏藏然暗室明炬擬艨艟於要津證大解脫不起一念頓成正覺且通箇入理之門然後陞普光明場據無漏清淨殊勝偉特法空之座海口瀾飜奮無礙四辯才立一機垂一句現一勝相普使凡聖有情無情俱仰威光同受庥蔭尚未是絕功勳處更轉那頭千聖羅籠不住萬靈景仰無門諸天無路捧花魔外那能傍放却知見卸却玄妙颺却作用唯饑餐渴飲而已初不知有心無心得念失念何況更戀著從前學解諦句奇言理性分劑名相桎梏佛見法見動地掀天世諦辯聰自纏自縛入海算沙有何所靠耶等是大丈夫應務敵勝驚羣滿自己本志願乃為本分大心大見大解脫無為無事真道人也評曰一書記未入佛果法嗣或是他枝學輩預入法會者也想見其人是必英偉傑特離類絕倫故其所示法語廣大精密如此葢所謂觀機授法非孟浪也又是篇入道蹊徑冥合洞上五位法門頭尾圓備識者辯之大洪恩禪師與無盡居士張公商英友善無盡甞以書問三教大要曰清凉疏第三卷西域邪見不出四見此方儒道亦不出此四見如莊老計自然為因能生萬物即是邪因易曰太極生兩儀太極為因亦是邪因若謂一陰一陽之謂道能生萬物亦是邪因若計一為虗無則是無因今疑老子自然與西天外道自然不同何以言之老子曰常無欲以觀其妙常有欲以觀其徼無欲則常有徼則已入其道矣謂之邪因豈有說乎易曰一陰一陽之謂道陰陽不測之謂神神也者妙萬物而為言寂然不動感而遂通天下之故今乃破陰陽變易之道為邪因撥去不測之神豈有說乎望紙後批示以斷疑網故也師答曰西域外道宗多途要其會歸不出有無四見而已謂有見無見亦有亦無見非有非無見也葢不即一心為道則道非我有故名外道不即諸法是心則法隨見異故名邪見如謂之有有則有無如謂之無無則無有有無則有見競生無有則無見斯起若亦有亦無見非有非無見亦猶是也夫不能離諸見則無以明自心無以明自心則不能知正道矣故經云言詞所說法小智妄分別不能了自心云何知正道又曰有見即為垢此則未為見遠離於諸見如是乃見佛以此論之邪正異途正由見悟殊致故也故清凉以莊老計道法自然能生萬物易謂太極生兩儀一陰一陽之謂道以自然太極為因一陰一陽為道能生萬物則是邪因計一為虗無則是無因甞試論之夫三界唯心萬緣一致心生故法生心滅故法滅推而廣之彌綸萬有而非有統而會之究竟寂滅而非無非無亦非非無非有亦非非有四執既亡百非斯遣則自然因緣皆為戲論虗無真實俱是假名矣至若謂太極陰陽能生萬物常無常有斯為眾妙之門陰陽不測是為無方之神雖聖人設教示悟多方然既異一心寧非四見何以明之葢虗無為道則是無若自然若太極若一陰一陽為道道則是有常無常有則是亦無亦有陰陽不測則是非有非無先儒或謂妙萬物謂之神則非物非物則亦是無故西天諸大論師皆以心外有法為外道萬法唯心為正宗葢以心為宗則諸見自亡言雖或異未足以為異也心外有法則諸見競生言雖或同未足以為同也雖然儒道聖人固非不知之乃存而不論耳良以未即明指一心為萬法之宗雖或言之猶不論也如西天外道皆大權菩薩示化之所施為橫生諸見曲盡異端以明佛法是為正道此其所以謂聖人之道順逆皆宗非思議之所能知矣故古人有言緣昔真宗未至孔子且以繫心今知理有所歸不應猶執權教然知權之為權未必知權也知權之為實斯知權矣是亦周孔老莊設教立言之本意一大事因緣之所成始所成終也然則三教一心同途異轍究竟道宗本無言說非維摩大士孰能知此意也評曰清涼非判孔老為外道葢判以佛法而附會于孔老者也夫不以心性定其宗旨而唯逐言象以雷其淺深則孟軻所謂不揣其本而齊其末方寸之木可使高於岑樓豈理也哉是篇言簡而意盡地寬而界嚴雖無盡喙長三尺亦無所施其辯矣信乎當代之哲匠護教之大士也汾州大達無業國師上堂有僧問曰十二分教流于此土得道果者非止一二云何祖師東化別唱玄宗直指人心見性成佛豈得世尊說法有所未盡只如上代諸德高僧竝學貫九流洞明三藏生肇融叡盡是神異間出豈得不知佛法遠近某甲愚昧願師指示師曰諸佛不曾出世亦無一法與人但隨病施方遂有十二分教如將蜜菓換苦葫蘆淘汝諸人業根都無實事神通變化盡百千三昧門化彼天魔外道福智二嚴為破執有滯空之見若不會道及祖師來意論什麼生肇融叡如今天下解禪解道如河沙數說佛說心有百千萬億纖塵不去未免輪迴思念不亡盡須沉墜如斯之類尚不能自識業果妄言自利利他自謂上流竝他先德但言觸目無非佛事舉足皆是道場原其所習不如一箇五戒十善凡夫觀其發言嫌他三乘十地菩薩且醍醐上味為世珍奇遇斯等人飜成毒藥南山尚自不許呼為大乘學語之流爭鋒唇舌之間鼓論不形之事竝他先德誠實苦哉只如野逸高士尚解枕石漱流棄其利祿亦有安國理民之謀徵而不赴況我禪宗途路且別看他古德道人得意之後茅茨石室向折脚鐺子裏煑飯喫過二三十年名利不干懷財寶不為念大忘人世隱跡巖叢君王命而不來諸侯請而不赴豈同我輩貪名愛利汩沒世途如短販人有少希求而忘大果十地諸賢豈不通佛理可不如一箇博地凡夫實無此理他說法如雲如雨猶被佛呵云見性如隔羅縠只為情存聖量見在果因未能逾越聖情過諸影跡先賢古德碩學高人博達古今洞明教網葢為識學詮文水乳難辨不明自理念靜求真嗟乎得人身者如爪甲上土失人身者如大地上土良可傷哉設有悟理之者有一知一解不知是悟中之則入理之門便謂永出世利巡山傍㵎輕忽上流致使心漏不盡理地不明空到老死無成虗延歲月且聰明不能敵業乾慧未免苦輪假使才竝馬鳴解齊龍樹只是一生兩生不失人身根思宿淨聞之即解如彼生公何足為羨與道全遠共兄弟論實不論虗只這口食身衣盡是欺賢罔聖求得將來他心慧眼觀之如喫膿血一般總須償他始得阿那箇有道果自然招得他信施來不受者學般若菩薩不得自謾如氷稜上行似劒刃上走臨終之時一毫凡聖情量不盡纖塵思念未忘隨念受生輕重五陰向驢胎馬腹裏託貭泥犁鑊湯裏煑煠一徧了從前記持憶想見解智慧都盧一時失却依前再為螻蟻從頭又作蚊䖟雖是善因而遭惡果且圖什麼兄弟只為貪欲咸性二十五有向脚跟下繫著無成辦之期祖師觀此土眾生有大乘根性唯傳心印指示迷情得之者即不揀凡之與聖愚之與智且多虗不如少實大丈夫兒如今直下便休歇頓息萬緣越生死流逈出常格靈光獨照物累不拘巍巍堂堂三界獨步何必身長丈六紫磨金輝頂佩圓光廣長舌相若以色見我是行邪道設有眷屬莊嚴不求自得山河大地不礙眼光得大總持一聞千悟都不希求一餐之直汝等諸人儻不如是祖師來至此土非常有損有益有益者百千人中撈漉一箇半箇堪為法器有損者如前已明從他依三乘教法修行不妨却得四果三賢有修進之分所以先德云了即業障本來空未了還須償宿債評曰禪宗之弊當時早已如此又何恠乎後世幸賴此老不惜口業一一數破使有志之士尚可以明生熟驗得失酌損益審進退不為世波漂蕩而喪其法體則是篇正今日對病之良藥也敬錄之於此以為禪學者龜鑑大智度論云復次一切法性皆空無所有汝所瞋因緣亦皆虗誑無實事故而受大罪如山中有一佛圖彼中有一別房房中有鬼來恐惱道人故諸道人皆捨房而去有一客僧來維那處分令住此房而語之言此房中有鬼神喜惱人能住中者住客僧自以持戒力多聞故言小鬼何所能我能伏之即入房住暮更有一僧來求住處維那亦令在此房住亦語有鬼惱人其人亦言小鬼何所能我當伏之先入者閉戶端坐待鬼後來者夜暗打門求入先入者謂為是鬼不為開戶後來者極力打門在內道人以力拒之外者得勝排門得入內者打之外者亦極力熟打至明旦相見乃是故舊同學各相愧謝眾人雲集笑而恠之眾生亦如是五眾無人無我空取相致鬪諍若支解在地但有骨肉無人無我是故菩薩語眾生言汝莫於根本空中鬪諍作罪鬪諍故人身尚不可得何況值佛評曰眾生三毒日用現行過失甚重而嗔毒之過失尤重葢由不達前境本空乃於自心中妄興對待以對待故鼓忿恨風吹心識火自他善根互相焚以正眼觀之政如二比丘閉門推門極力打鬼修道人當逆境擊心恚覺勃發時能入此觀則直下釋然氷消瓦解亦如二比丘天明相見自當撫掌一笑耳梁善慧大士四相頌生曰識託浮泡起生從愛慾來昔時曾長大今日復嬰孩星眼隨人轉朱唇向乳開為憐迷覺性還劫受輪迴老曰覧鏡容顏改登階氣刀衰咄哉今已老趨拜復還虧身似臨崖樹心如念水龜尚猶躭有漏不肯學無為病曰忽染沈疴疾因成臥病身妻兒愁不語朋友厭相親楚痛抽千脉呻吟徹四隣不知前路險猶向恣貪瞋死曰精魄隨生路遊魂入死關只聞千萬去不見一人還寶馬空嘶立庭花永絕攀早求無上道應免四方山評曰生老病死四件極大事集在一身世人夢裏貪歡漠然不顧可嘆也故傅大士一一頌出欲人知其苦耳既知其苦則知求其所以出苦之法所謂早求無上道應免四方山是也祇如無上道畢竟如何求大士又有偈曰有物先天地無形本寂寥能為萬象主不逐四時凋若真知此偈所歸尚何四相可言其或未然時不待人切須努力移剌真卿丞相先是元世主將西征有司奏五臺等處僧徒有能呪術武略及有膂力者可為部兵扈從西征公止之曰釋氏之高行者必守不殺戒奉慈忍行故有危身不證鵞珠守死不拔生草者法王法令拳拳奉持雖死不犯用之從兵豈其宜哉其不循法律者必無志行在彼既違佛旨在此豈忠王事故皆不可以從王師也帝從之公得法於萬松秀禪師號湛然居士云評曰以僧從征法滅之相也湛然奏止之其護法之功不在禹下且其所陳論精確嚴明千古猶見生氣至於輓近之世無志行僧往往有之佛法王法皆成罪人吾不知其何以自立於天地之間也悲夫大珠和尚僧問般若經云度九類眾生皆入無餘涅槃又云實無眾生得滅度者此兩段經文如何通會前後人說皆云實度眾生而不取眾生相常疑未決請師為說師曰九類眾生一心具足隨造隨成是故無明為卵生煩惱包褁為胎生愛水浸潤為濕生歘起煩惱為化生悟即是佛迷號眾生菩薩只以念念心為眾生若了念念心體空名為度眾生也智者於自本際上度於未形未形既空即知實無眾生得滅度者評云華嚴云應觀法界性一切惟心造而大珠亦云九類眾生一心具足隨造隨成楞伽云從上諸聖轉相傳受妄想無性而大珠亦云若了念念心體空名為度眾生楞嚴云妙性圓明離諸名相本來無有世界眾生而大珠亦云智者於自本際上度於未形未形既空即無眾生得滅度者是知佛祖同一道眼同一舌頭其清淨顯露如月處空有眼皆見但後輩鮮肯深究力行遂成紙上陳語予觀是篇實修行者日用治心之要故表出之當有賞音者耳菩提達磨略辯大乘入道四行法師者西域南天竺國是大婆羅門國王第三之子也神慧疎朗聞皆曉悟志存摩訶衍道故捨素從緇紹隆聖種冥心虗寂通鑑世事內外俱明德超世表悲悔邊隅正教陵替遂能遠涉山海遊化漢魏忘心之士莫不歸信存見之流乃生譏謗于時唯有道育慧可此二沙門年雖後生俊志高遠幸逢法師事之數載虔恭諮啟善蒙師意法師感其精誠誨以真道令如是安心如是發行如是順物如是方便此是大乘安心之法令無錯謬如是安心者壁觀如是發行者四行如是順物者防護譏嫌如是方便者遣其不著此略序所由云爾夫入道多途要而言之不出二種一是理入二是行入理入者謂藉教悟宗深信含生同一真性但為客塵妄想所覆不能顯了若也捨妄歸真凝住壁觀無自無他凡聖等一堅住不移更不隨于文教此即與理冥符無有分別寂然無為名之理入行入者謂四行其餘諸行悉入此中何等四耶一報冤行二隨緣行三無所求行四稱法之行云何報冤行謂修道行人若受苦時當自念言我從往昔無數劫中棄本從末流浪諸有多起冤憎違害無限今雖無犯是我宿殃惡業果熟非天非人所能見與甘心忍受都無冤訴經云逢苦不憂何以故識達故此心生時與理相應體冤進道故說言報冤行二隨緣行者眾生無我並緣業所轉苦樂齊受皆從緣生若得勝報榮譽等事是我過去宿因所感今方得之緣盡還無何喜之有得失從緣心無增減喜風不動宜順於道是故說言隨緣行也三無所求行者世人長迷處處貪著名之為求智者悟真理將俗反安心無為形隨運轉萬有斯空無所願樂功德黑暗常相隨逐三界久居猶如火宅有身皆苦誰得而安了達此處故捨諸有息想無求經云有求皆苦無求乃樂判知無求真為道行故言無所求行也四稱法行性淨之理目之為法此理眾相斯空無染無著無此無彼經云法無眾生離眾生垢故法無有我離我垢故智者若能信解此理應當稱法而行法體無慳於身命財行檀捨施心無恡惜達解三空不倚不著但為去垢稱化眾生而不取相此為自行復能利他亦能莊嚴菩提之道檀施既爾餘五亦然為除妄想修行六度而無所行是為稱法行弟子曇彬序評曰達祖單傳心印外復別示此四行其意盖為後來見而不行與夫說而不通者作鍼艾耳大丈夫當於此決志力行以期智證毋徒空騰口說應祖師之懸讖也六祖大師四智偈曰大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但用名言無寔性若于轉處不留情繁興永處那伽定評曰或問六祖大師偈發明轉識成智之旨與教乘同異何如答曰教中謂轉第八阿賴耶識為大圓鏡智轉第七末那識為平等性智轉第六意識為妙觀察智轉前五識為成所作智何時轉耶謂六七二識初地即轉至七八二地方永轉以六識入生法二空觀時礙第七識二執不得現起及第六識轉智之時而第七識亦隨轉也故曰六七因中轉五八二識至佛果位中方轉以前五根乃第八識之相分八識未轉則前五識亦不得轉若八識轉則前五識亦隨轉也故曰五八果上圓此大乘權教所說如此非禪宗圓頓最上乘也今祖師直于眾生分上覿體指出本有四智謂此性本來清淨一塵叵得即是大圓鏡智此性本來平等無我法二執之病即是平等性智此性本有光明不緣而照即是妙觀察智若成所作智則與鏡智同但體用之分耳如此觀之則眾生日用現行無明全體即是諸佛四智菩提尚何識之可轉以識本空寂即是智故圭峰所謂識如夢幻但是一心是也若權乘所謂五八六七果因轉之說但約從因至果轉其假名而已非謂實有識可轉而為智也若寔有可轉則所謂智者乃有為菩提豈當人本有無師自然之真智乎以無識可轉方是真智也葢識智無二同一性故如寒則結水而成氷暖則融氷而為水氷水名異濕性無殊故學者修證轉識成智之處苟能不留滯著之情則雖終日轉而寔無識可轉無智可得以識既本空智亦本寂一心湛然無動轉故行人日用明此可以坐進斯道僧亡名息心銘曰法界有如意寶人焉九緘其身銘其膺曰古之攝心人也戒之哉戒之哉無多慮無多知多知多事不如息意多慮多失不如守一慮多志散知多心亂心亂生惱志散妨道勿謂何傷其苦攸長勿言何畏其禍鼎沸滴水不停四海將盈纖塵不拂五嶽將成防末在本雖小不輕關爾七竅閉爾六情莫見於色莫聽於聲聞聲者聾見色者盲一文一藝空中小蚋一技一能日下孤燈英賢才藝是為愚蔽捨棄淳朴沉溺淫麗識馬易奔心猿難制神既勞役形必損斃邪行終迷修途永泥莫貴才能日益惛瞢誇拙羨巧其德不弘名厚行薄其高速崩內懷憍伐外致怨憎或談於口或書於手邀人令譽亦孔之醜凡謂之吉聖謂之咎賞翫蹔時悲哀長久畏影畏迹逾遠逾極端坐樹陰跡滅影沉厭生患老隨思隨造心想若滅生死長絕不死不生無相無名一道虗寂萬物齊平何貴何賤何辱何榮何勝何劣何重何輕澄天愧淨皎日慙明安夫岱嶺固彼金城敬貽賢哲斯道利貞黃山谷書其後曰梁左補闕宗殆以文學行義知名梁之亡也殆棄其官族出家號無名後周欲奪其志命大臣以美官誘之無名自陳宗國顛覆反俗有七不可誓言哀切遂不奪之又賦五苦詩詩意高潔時多傳寫觀息心銘似其晚年所作亦似悔其少日刻意於文章耶因僧知海請書此篇以刻石為叢林雜學者之戒故為書之評曰息心銘文體立意一倣金人銘其旨葢欲學者歇鏡中之狂心息岐路之雜藝庶幾悟頭而獲羊耳予滋愛之但不敢必誰所作題云僧亡名意謂已亡其名後讀黃山谷太史文集始知非亡名乃名亡名也今并以其說載之于此使覧者知所自云爾
